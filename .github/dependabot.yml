version: 2
updates:
  # Keep the SHA-pinned GitHub Actions up to date (Dependabot rewrites the pin
  # and the trailing version comment automatically).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        update-types: [minor, patch]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    groups:
      minor-patch:
        update-types: [minor, patch]
